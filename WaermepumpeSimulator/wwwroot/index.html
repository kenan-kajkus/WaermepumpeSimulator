<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wärmepumpe Simulator & JAZ Rechner</title>
    <base href="/" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WaermepumpeSimulator.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="_content/Blazor-ApexCharts/css/apexcharts.css" />
</head>
<body class="text-gray-800">
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
            <div class="text-center">
                <div class="loader" style="width:40px;height:40px;margin:0 auto 1rem;border:3px solid #f3f3f3;border-top:3px solid #3498db;border-radius:50%;animation:spin 1s linear infinite;"></div>
                <p style="color:#666;">Lade Simulator...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;">
        Ein Fehler ist aufgetreten.
        <a href="." class="reload">Neu laden</a>
        <span class="dismiss">X</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.blazorGetLocation = function () {
            return new Promise(function (resolve, reject) {
                navigator.geolocation.getCurrentPosition(
                    function (pos) { resolve([pos.coords.latitude, pos.coords.longitude]); },
                    function (err) { reject(err.message); },
                    { timeout: 10000 }
                );
            });
        };
        window.blazorStorage = {
            set: function (key, json) { localStorage.setItem(key, json); },
            get: function (key) { return localStorage.getItem(key); }
        };
    </script>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
